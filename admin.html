<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftTrans Logistics | Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <!-- Firebase SDKs (Compat Version) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  
  <style>
    .sidebar-link { transition: all 0.2s; }
    .sidebar-link:hover { background-color: #1e40af; color: white; }
    .status-dot { animation: ping 2s infinite; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
  <div class="flex h-screen">
    <!-- SIDEBAR -->
    <div class="w-72 bg-zinc-900 border-r border-zinc-800 flex flex-col">
      <div class="p-6 border-b border-zinc-800">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-bold text-2xl">S</div>
          <div>
            <div class="text-2xl font-bold tracking-tight">SwiftTrans</div>
            <div class="text-xs text-emerald-400">LOGISTICS ADMIN</div>
          </div>
        </div>
      </div>

      <nav class="flex-1 p-4 space-y-1">
        <a onclick="navigateTo('dashboard')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl text-white bg-blue-600">
          <i class="fa-solid fa-gauge-high"></i> Dashboard
        </a>
        <a onclick="navigateTo('shipments')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl">
          <i class="fa-solid fa-box"></i> All Shipments
        </a>
        <a onclick="navigateTo('new-shipment')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl">
          <i class="fa-solid fa-plus"></i> New Shipment
        </a>
        <a onclick="navigateTo('analytics')" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-2xl">
          <i class="fa-solid fa-chart-pie"></i> Analytics
        </a>
      </nav>

      <div class="p-4 border-t border-zinc-800">
        <div class="flex items-center gap-3 p-3 bg-zinc-800 rounded-2xl">
          <div class="w-9 h-9 bg-zinc-700 rounded-xl flex items-center justify-center">
            👨‍💼
          </div>
          <div>
            <div class="font-medium">Admin</div>
            <div class="text-xs text-emerald-400">Online</div>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col">
      <header class="bg-zinc-900 border-b border-zinc-800 px-8 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <input id="search-input" type="text" placeholder="Search by Tracking ID or Customer..." 
                 class="bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 w-96 focus:outline-none focus:border-blue-500">
        </div>
        <button onclick="logout()" class="px-6 py-3 bg-zinc-800 hover:bg-red-500/10 hover:text-red-400 rounded-2xl transition-all">
          Logout
        </button>
      </header>

      <div class="flex-1 overflow-auto p-8" id="main-content"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-emerald-600 text-white px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3">
    <i class="fa-solid fa-check-circle"></i>
    <span id="toast-text"></span>
  </div>

  <script>
    // ================== YOUR FIREBASE CONFIG ==================
    const firebaseConfig = {
      apiKey: "AIzaSyC1rb8p4KsKaxQK_QVtjWbFE5IStV1F5CI",
      authDomain: "swifttrans-logistics.firebaseapp.com",
      projectId: "swifttrans-logistics",
      storageBucket: "swifttrans-logistics.firebasestorage.app",
      messagingSenderId: "336087148680",
      appId: "1:336087148680:web:d3fb690dd18d2337ca973d",
      measurementId: "G-0W702ZGW7M"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let shipments = [];

    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-text').innerHTML = message;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 4000);
    }

    async function loadShipments() {
      try {
        const snapshot = await db.collection("shipments").orderBy("createdAt", "desc").get();
        shipments = [];
        snapshot.forEach(doc => {
          shipments.push({ id: doc.id, ...doc.data() });
        });
      } catch (e) {
        console.error(e);
        showToast("Using demo data (Firebase connection issue)");
      }
    }

    function renderDashboard() {
      document.getElementById('main-content').innerHTML = `
        <h1 class="text-4xl font-bold mb-8">Dashboard</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
          <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="text-emerald-400">TOTAL SHIPMENTS</div>
            <div class="text-6xl font-bold mt-4">${shipments.length}</div>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="text-blue-400">IN TRANSIT</div>
            <div class="text-6xl font-bold mt-4">${shipments.filter(s => s.status === "In Transit").length}</div>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="text-emerald-400">DELIVERED</div>
            <div class="text-6xl font-bold mt-4">${shipments.filter(s => s.status === "Delivered").length}</div>
          </div>
          <div class="bg-zinc-900 rounded-3xl p-8">
            <div class="text-amber-400">PENDING</div>
            <div class="text-6xl font-bold mt-4">${shipments.filter(s => s.status === "Pending").length}</div>
          </div>
        </div>
      `;
    }

    function renderShipments() {
      let html = `<h1 class="text-4xl font-bold mb-8">All Shipments</h1>`;
      html += `<div class="bg-zinc-900 rounded-3xl overflow-hidden">`;
      html += `<table class="w-full">`;
      html += `<thead><tr class="border-b border-zinc-800 bg-zinc-950">`;
      html += `<th class="text-left p-6">Tracking ID</th>`;
      html += `<th class="text-left p-6">Customer</th>`;
      html += `<th class="text-left p-6">Route</th>`;
      html += `<th class="text-left p-6">Status</th>`;
      html += `<th class="text-left p-6">Created</th>`;
      html += `<th class="p-6 w-32">Actions</th></tr></thead><tbody>`;

      shipments.forEach(shipment => {
        const statusClass = shipment.status === 'Delivered' ? 'emerald' : 
                           shipment.status === 'In Transit' ? 'blue' : 'amber';
        html += `
          <tr class="border-b border-zinc-800 hover:bg-zinc-800/70">
            <td class="p-6 font-mono font-medium">${shipment.trackingId || shipment.id}</td>
            <td class="p-6">${shipment.customer}</td>
            <td class="p-6">${shipment.origin} → ${shipment.destination}</td>
            <td class="p-6">
              <span class="px-5 py-1.5 bg-\( {statusClass}-900 text- \){statusClass}-400 rounded-full text-sm font-medium">
                ${shipment.status}
              </span>
            </td>
            <td class="p-6 text-zinc-400">${shipment.createdAt ? new Date(shipment.createdAt.seconds * 1000).toLocaleDateString() : 'N/A'}</td>
            <td class="p-6">
              <button onclick="updateStatus('${shipment.id}')" class="text-blue-400 hover:text-blue-300 mr-4">Update</button>
              <button onclick="deleteShipment('${shipment.id}')" class="text-red-400 hover:text-red-300">Delete</button>
            </td>
          </tr>`;
      });

      html += `</tbody></table></div>`;
      document.getElementById('main-content').innerHTML = html;
    }

    function renderNewShipment() {
      document.getElementById('main-content').innerHTML = `
        <h1 class="text-4xl font-bold mb-8">Create New Shipment</h1>
        <div class="max-w-2xl bg-zinc-900 rounded-3xl p-10">
          <form onsubmit="createNewShipment(event)" class="space-y-8">
            <div>
              <label class="block text-sm mb-2 font-medium">Customer Name</label>
              <input type="text" id="customer" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-blue-500">
            </div>
            <div class="grid grid-cols-2 gap-6">
              <div>
                <label class="block text-sm mb-2 font-medium">Origin</label>
                <input type="text" id="origin" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
              </div>
              <div>
                <label class="block text-sm mb-2 font-medium">Destination</label>
                <input type="text" id="destination" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4">
              </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 transition-all py-6 rounded-3xl text-xl font-semibold">
              Create Shipment
            </button>
          </form>
        </div>
      `;
    }

    async function createNewShipment(e) {
      e.preventDefault();
      
      const newShipment = {
        trackingId: "ST-" + Math.floor(10000000 + Math.random() * 90000000),
        customer: document.getElementById('customer').value,
        origin: document.getElementById('origin').value,
        destination: document.getElementById('destination').value,
        status: "Pending",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        await db.collection("shipments").add(newShipment);
        showToast("✅ Shipment created successfully!");
        navigateTo('shipments');
      } catch (error) {
        console.error(error);
        showToast("Error saving to Firebase. Check console.");
      }
    }

    async function updateStatus(id) {
      const newStatus = prompt("New Status:\n1. Pending\n2. In Transit\n3. Delivered", "In Transit");
      if (!newStatus) return;

      const statusMap = { "1": "Pending", "2": "In Transit", "3": "Delivered" };
      const finalStatus = statusMap[newStatus] || newStatus;

      try {
        await db.collection("shipments").doc(id).update({
          status: finalStatus,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast(`Status updated to ${finalStatus}`);
        loadShipments().then(() => renderShipments());
      } catch (e) {
        showToast("Update failed");
      }
    }

    async function deleteShipment(id) {
      if (!confirm("Delete this shipment permanently?")) return;
      
      try {
        await db.collection("shipments").doc(id).delete();
        showToast("Shipment deleted");
        loadShipments().then(() => renderShipments());
      } catch (e) {
        showToast("Delete failed");
      }
    }

    function navigateTo(page) {
      if (page === 'dashboard') renderDashboard();
      else if (page === 'shipments') renderShipments();
      else if (page === 'new-shipment') renderNewShipment();
    }

    function logout() {
      if (confirm("Logout?")) window.location.href = "index.html";
    }

    // Initialize
    window.onload = async () => {
      await loadShipments();
      navigateTo('dashboard');
      showToast("✅ Connected to SwiftTrans Firebase");
    };
  </script>
</body>
  </html>
