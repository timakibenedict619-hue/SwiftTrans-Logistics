<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Shipments</title>

<link rel="stylesheet" href="admin.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
background:#f4f6f9;
}

.sidebar{
width:250px;
height:100vh;
background:#0d47a1;
color:#fff;
position:fixed;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
margin:18px 0;
}

.sidebar ul li a{
text-decoration:none;
color:#fff;
font-size:16px;
}

.main{
margin-left:250px;
padding:25px;
width:100%;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-box input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
}

.search-box button{
padding:12px 20px;
background:#0d47a1;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:#fff;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

th{
background:#0d47a1;
color:#fff;
padding:15px;
}

td{
padding:15px;
border-bottom:1px solid #ddd;
text-align:center;
}

.action-btn{
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
margin:2px;
color:#fff;
}

.view{
background:#2196F3;
}

.edit{
background:#ff9800;
}

.delete{
background:#f44336;
}

.email{
background:#4CAF50;
}

@media(max-width:900px){

body{
display:block;
}

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
}

table{
display:block;
overflow-x:auto;
}

}
</style>

</head>

<body>

<div class="sidebar">

<h2>Consignment</h2>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>

<li><a href="create-shipment.html">Create Shipment</a></li>

<li><a href="manage-shipments.html">Manage Shipments</a></li>

<li><a href="track.html">Tracking</a></li>

<li><a href="#">Settings</a></li>

</ul>

</div>

<div class="main">

<div class="header">

<h1>Manage Shipments</h1>

<button onclick="location.href='create-shipment.html'">
+ New Shipment
</button>

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search by Tracking ID...">

<button id="searchBtn">
Search
</button>

<button id="refreshBtn">
Refresh
</button>

</div>

<table>

<thead>

<tr>

<th>Tracking ID</th>

<th>Receiver</th>

<th>Destination</th>

<th>Status</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="shipmentTable">

<tr>

<td colspan="5">
Loading shipments...
</td>

</tr>

</tbody>

</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="module" src="manage-shipments.js"></script>

</body>
</html>
