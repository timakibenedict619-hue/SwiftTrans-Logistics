<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Shipment</title>

<link rel="stylesheet" href="admin.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

h1{
color:#0d47a1;
margin-bottom:25px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:20px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
margin-bottom:8px;
font-weight:bold;
color:#555;
}

input,
select,
textarea{
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

textarea{
min-height:120px;
resize:vertical;
}

.buttons{
display:flex;
gap:15px;
margin-top:30px;
}

button,
a{
padding:12px 20px;
border:none;
border-radius:6px;
text-decoration:none;
cursor:pointer;
font-size:15px;
}

.save{
background:#0d47a1;
color:#fff;
}

.cancel{
background:#777;
color:#fff;
}

@media(max-width:768px){

.row{
grid-template-columns:1fr;
}

.buttons{
flex-direction:column;
}

}
</style>

</head>

<body>

<div class="container">

<h1>Edit Shipment</h1>

<form id="editShipmentForm">

<div class="row">

<div class="form-group">
<label>Tracking ID</label>
<input type="text" id="trackingId" readonly>
</div>

<div class="form-group">
<label>Status</label>
<select id="status">
<option>Pending</option>
<option>Processing</option>
<option>Picked Up</option>
<option>In Transit</option>
<option>Arrived at Hub</option>
<option>Customs Clearance</option>
<option>Out For Delivery</option>
<option>Delivered</option>
<option>Cancelled</option>
</select>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Sender Name</label>
<input type="text" id="senderName">
</div>

<div class="form-group">
<label>Receiver Name</label>
<input type="text" id="receiverName">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Sender Email</label>
<input type="email" id="senderEmail">
</div>

<div class="form-group">
<label>Receiver Email</label>
<input type="email" id="receiverEmail">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Sender Phone</label>
<input type="text" id="senderPhone">
</div>

<div class="form-group">
<label>Receiver Phone</label>
<input type="text" id="receiverPhone">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Origin</label>
<input type="text" id="origin">
</div>

<div class="form-group">
<label>Destination</label>
<input type="text" id="destination">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Carrier</label>
<input type="text" id="carrier">
</div>

<div class="form-group">
<label>Weight</label>
<input type="text" id="weight">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Current Location</label>
<input type="text" id="currentLocation">
</div>

<div class="form-group">
<label>Expected Delivery</label>
<input type="date" id="expectedDelivery">
</div>

</div>

<div class="form-group">

<label>Description</label>

<textarea id="description"></textarea>

</div>

<div class="buttons">

<button class="save" type="submit">
Save Changes
</button>

<a href="manage-shipments.html" class="cancel">
Cancel
</a>

</div>

</form>

</div>

<script type="module" src="edit-shipment.js"></script>

</body>
</html>
